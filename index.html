/* =========================
   Load
========================= */
function loadImage(file){
 if(!file?.type.startsWith("image/")) return;
 const r=new FileReader();
 r.onload=()=>{
  img.onload=()=>{
   canvas.width=img.width; canvas.height=img.height;
   imageLoaded=true; redraw();
  };
  img.src=r.result;
 };
 r.readAsDataURL(file);
}

function loadJSON(file){
 if(!file||file.type!=="application/json") return;
 if(points.length && !confirm("Écraser ?")) return;

 const r=new FileReader();
 r.onload=()=>{
  const d=JSON.parse(r.result);
  canvas.width=d.imageWidth; canvas.height=d.imageHeight;
  points=d.points||[];
  traits=d.traits||[];

  reset();

  if(Array.isArray(d.path)){
   pathEdges=d.path;
   animatedCount=pathEdges.length;
   playBtn.style.display=stopBtn.style.display="inline-block";
  }

  redraw();
 };
 r.readAsText(file);
}

function loadDefault() {

  // --- Charger image ---
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    imageLoaded = true;
    redraw();
  };
  img.src = "parc monceau.png"; // 📌 ton fichier local

  // --- Charger JSON ---
  fetch("https://jhepneige.github.io/ParcMonceau/plan_path v2-temp.json")
    .then(r => r.json())
    .then(d => {
      points = d.points || [];
      traits = d.traits || [];

      if (Array.isArray(d.path)) {
        pathEdges = d.path;
        animatedCount = pathEdges.length;
        playBtn.style.display = "inline-block";
        stopBtn.style.display = "inline-block";
      }

      redraw();
    })
    .catch((e) => {
      console.log("Pas de JSON chargé",e);
    });
}

/* =========================
   Utils
========================= */
function pos(e){
 const r=canvas.getBoundingClientRect();
 return {x:e.clientX-r.left,y:e.clientY-r.top};
}

function findPoint(x,y){
 return points.findIndex(p=>Math.hypot(p.x-x,p.y-y)<8);
}

function dist(a,b){
 return Math.hypot(a.x-b.x,a.y-b.y);
}

function reset(){
 pathEdges=[];
 animatedCount=0;
 clearInterval(timer);
 playBtn.style.display=stopBtn.style.display="none";
 report.textContent="";
}

/* =========================
   BFS
========================= */
function shortestPath(a,b){
 const q=[[a]], seen=new Set([a]);

 while(q.length){
  const p=q.shift(), v=p.at(-1);
  if(v===b) return p;

  traits.forEach(t=>{
   const n=t.from===v?t.to:t.to===v?t.from:null;
   if(n!==null&&!seen.has(n)){
    seen.add(n);
    q.push([...p,n]);
   }
  });
 }
 return [];
}

/* =========================
   Matching optimal (bruteforce)
========================= */
function computeDistances(odd){
 const d={};
 odd.forEach(a=>{
  d[a]={};
  odd.forEach(b=>{
   if(a===b) d[a][b]=0;
   else d[a][b]=shortestPath(a,b).length-1;
  });
 });
 return d;
}

function bestMatching(odd,dist){
 if(odd.length===0) return {cost:0,pairs:[]};

 let v=odd[0];
 let best={cost:Infinity,pairs:[]};

 for(let i=1;i<odd.length;i++){
  let u=odd[i];
  let rest=odd.filter(x=>x!==v&&x!==u);

  let sub=bestMatching(rest,dist);
  let cost=dist[v][u]+sub.cost;

  if(cost<best.cost){
   best={cost,pairs:[[v,u],...sub.pairs]};
  }
 }

 return best;
}

/* =========================
   Parcours
========================= */
pathBtn.onclick=()=>{
 reset();

 let calcEdges=traits.map(t=>({...t,replay:false}));

 /* degrés */
 let deg={};
 traits.forEach(t=>{
  deg[t.from]=(deg[t.from]||0)+1;
  deg[t.to]=(deg[t.to]||0)+1;
 });

 let odd=Object.keys(deg).filter(k=>deg[k]%2).map(Number);

 /* ✅ étape locale */
 while(true){
  let best=null, bestD=Infinity;

  traits.forEach(t=>{
   if(odd.includes(t.from)&&odd.includes(t.to)){
    let d=dist(points[t.from],points[t.to]);
    if(d<bestD){bestD=d; best=t;}
   }
  });

  if(!best) break;

  calcEdges.push({...best,replay:true});
  deg[best.from]++; deg[best.to]++;
  odd=Object.keys(deg).filter(k=>deg[k]%2).map(Number);
 }

 let rep="";

 /* ✅ matching optimal si petit */
 if(!isDebug && odd.length<=12){
  const dm=computeDistances(odd);
  const sol=bestMatching(odd,dm);

  rep+="Appariement optimal\n";

  sol.pairs.forEach(([a,b])=>{
   const p=shortestPath(a,b);
   rep+=`- ${p.length-1} segments\n`;

   for(let i=0;i<p.length-1;i++)
    calcEdges.push({from:p[i],to:p[i+1],replay:true});
  });

 }else{

  odd.sort(()=>Math.random()-0.5);

  while(odd.length>=2){
   const a=odd.pop(),b=odd.pop();
   const p=shortestPath(a,b);

   rep+=`- ${p.length-1} segments\n`;

   for(let i=0;i<p.length-1;i++)
    calcEdges.push({from:p[i],to:p[i+1],replay:true});
  }
 }

 /* Hierholzer */
 const adj={},used=new Set(),stack=[calcEdges[0]?.from],tmp=[];

 calcEdges.forEach((t,i)=>{
  (adj[t.from]??=[]).push({to:t.to,i});
  (adj[t.to]??=[]).push({to:t.from,i});
 });

 while(stack.length){
  const v=stack.at(-1);
  const e=(adj[v]||[]).find(x=>!used.has(x.i));
  if(e){
   used.add(e.i);
   stack.push(e.to);
   tmp.push({from:v,to:e.to,replay:calcEdges[e.i].replay});
  }else{
   stack.pop();
   if(tmp.length) pathEdges.unshift(tmp.pop());
  }
 }

 /* longueur */
 let L=0;
 pathEdges.forEach(e=>{
  L+=dist(points[e.from],points[e.to]);
 });

 rep+=`\nLongueur totale : ${L.toFixed(2)} px`;
 report.textContent=rep;

 playBtn.style.display=stopBtn.style.display="inline-block";
 redraw();
};

/* =========================
   Animation
========================= */
playBtn.onclick=()=>{
 animatedCount=0;
 clearInterval(timer);

 timer=setInterval(()=>{
  if(animatedCount<pathEdges.length){
   animatedCount++;
   redraw();
  }else clearInterval(timer);
 },100);
};

stopBtn.onclick=()=>clearInterval(timer);

/* =========================
   Draw
========================= */
function redraw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 if(imageLoaded) ctx.drawImage(img,0,0);

 ctx.strokeStyle="#000"; ctx.lineWidth=2;
 traits.forEach(t=>{
  const a=points[t.from],b=points[t.to];
  ctx.beginPath(); ctx.moveTo(a.x,a.y);
  ctx.lineTo(b.x,b.y); ctx.stroke();
 });

 points.forEach((p,i)=>{
  if(showOdd&&oddNodes.has(i)) ctx.fillStyle="red";
  else ctx.fillStyle="blue";

  ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill();
 });

 const cycle=12;
 for(let i=0;i<animatedCount;i++){
  const e=pathEdges[i];
  const a=points[e.from],b=points[e.to];

  const dx=b.y-a.y, dy=a.x-b.x;
  const len=Math.hypot(dx,dy)||1;
  const off=e.replay?3:0;
  const ox=dx/len*off, oy=dy/len*off;

  const g=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
  g.addColorStop(0,`hsl(${(i/cycle*360)%360},100%,50%)`);
  g.addColorStop(1,`hsl(${((i+1)/cycle*360)%360},100%,50%)`);

  ctx.strokeStyle=g;
  ctx.lineWidth=e.replay?2:4;

  ctx.beginPath();
  ctx.moveTo(a.x+ox,a.y+oy);
  ctx.lineTo(b.x+ox,b.y+oy);
  ctx.stroke();
 }
}

loadDefault();
