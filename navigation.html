<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Navigation mobile</title>

<style>

body {
    margin:0;
    overflow:hidden; /* empêche scroll */
    background:black;
}

/* ✅ viewport = plein écran */
#viewport {
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;

    overflow:hidden;
    background:black;

    perspective:900px;
}


/* ✅ carte */
#map {
    position:absolute;
    top:0;
    left:0;
    transform-origin:0 0;
    z-index:1;
    transition: transform 0.3s ease;
}

/* ✅ canvas */
canvas {
    display:block;
}

/* ✅ boutons FIX (plus de translateZ) */

#controls {
    position:fixed;   /* ✅ plus lié au viewport simulé */

    gap: clamp(8px, 2.5vw, 20px);
    top: 25%;//clamp(10px, 2vw, 30px);
    right: clamp(10px, 2vw, 30px);
	transform: translateY(-50%); 

    display:flex;
    flex-direction:column;

    z-index:1000;
}


button {
//    padding:10px;
    background:white;
    border:none;
 
    width: clamp(80px, 20vw, 150px);
    height: clamp(80px, 20vw, 150px);
    font-size: clamp(30px, 10vw, 60px);
    border-radius: clamp(6px, 1vw, 12px);

    box-shadow:0 2px 6px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div id="viewport">

    <div id="map">
        <canvas id="canvas"></canvas>
    </div>

    <div id="controls">
        <button onclick="nextStep()">▶</button>
        <button onclick="prevStep()">◀</button>
    </div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const mapDiv = document.getElementById("map");

let img = new Image();
let imageLoaded = false;
let points = [];
let pathEdges = [];
let step = 0;

let currentNode = null;
let currentAngleFrom = 0;
let currentAngleTo = 0;
let lastAngle=null;

window.addEventListener("resize", redraw);

/* =========================
   LOAD
========================= */
img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    imageLoaded = true;
    redraw();
};

img.src = "parc monceau.png";

fetch("https://jhepneige.github.io/ParcMonceau/plan v1_path v2.json")
.then(r => r.json())
.then(data => {
    points = data.points || [];
    pathEdges = data.path || [];
    redraw();
});

/* =========================
   NAVIGATION
========================= */
function nextStep() {
    if (step < pathEdges.length - 1) step++;
    redraw();
}

function prevStep() {
    if (step > 0) step--;
    redraw();
}

/* =========================
   DRAW
========================= */
function redraw() {
    if (!imageLoaded || pathEdges.length === 0) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);

    const currEdge = pathEdges[step];
    const currNode = points[currEdge.from];
    const nextNode = points[currEdge.to];

    const prevNode = step === 0
        ? {x:546, y:147} //hardcoded assuming parcmonceau plan v1_path vX
        : points[pathEdges[step - 1].from];

    const angleFrom = Math.atan2(
        currNode.y - prevNode.y,
        currNode.x - prevNode.x
    );

    const angleTo = Math.atan2(
        nextNode.y - currNode.y,
        nextNode.x - currNode.x
    );

    currentNode = currNode;
    currentAngleFrom = angleFrom;
    currentAngleTo = angleTo;

    applyCamera(currNode, angleFrom);

    drawArrow();
}

/* =========================
   CAMERA CSS
========================= */

const modulo = (x, n) => x - Math.floor(x / n) * n;

function goodAngle(a) {
  return modulo(a + Math.PI, 2 * Math.PI) - Math.PI;
}
function deg(x){return x* 180 / Math.PI;}

function applyCamera(node, angleFrom) {

    const zoom = 4;
//    const viewW = 360;
//    const viewH = 640;

	const viewW = window.innerWidth;
	const viewH = window.innerHeight;

    let angleDeg = goodAngle(-angleFrom - Math.PI/2);
	if (lastAngle!=null && Math.abs(lastAngle-angleDeg)>Math.PI/2) angleDeg=lastAngle+goodAngle(angleDeg-goodAngle(lastAngle)); // is it worth testing ?
	lastAngle=angleDeg;

    mapDiv.style.transform = `
        translate(${viewW/2}px, ${viewH/2}px)
        rotateX(60deg)
        rotate(${deg(angleDeg)}deg)
        scale(${zoom})
        translate(${-node.x}px, ${-node.y}px)
    `;
}

/* =========================
   FLECHE corrigée
========================= */
function drawArrow() {

    if (!currentNode) return;

    const relativeAngle = currentAngleTo + Math.PI/2 ;

    ctx.save();

    // ✅ On positionne la flèche AU NOEUD courant (et pas écran)
    ctx.translate(currentNode.x, currentNode.y);

    ctx.rotate(relativeAngle);

    ctx.fillStyle = "blue";
	ctx.globalAlpha = 0.5;    

	ctx.scale(0.5, 0.5);

	ctx.beginPath();
    ctx.moveTo(0,-100);
    ctx.lineTo(20,-60);
    ctx.lineTo(5,-60);
    ctx.lineTo(5, 0);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-5,-60);
    ctx.lineTo(-20,-60);
    ctx.closePath();

    ctx.fill();

    ctx.restore();
}

</script>

</body>
</html>
