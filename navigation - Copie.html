<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Navigation mobile</title>

<style>
body {
    margin:0;
    position:relative;
}

#container {
    position:relative;
    display:inline-block; /* taille = canvas */
}

canvas {
    display:block;
}

#controls {
    position:absolute;
    top:10px;
    right:10px;

    display:flex;
    flex-direction:column;
    gap:8px;
}

button {
    font-size:16px;
    padding:10px;
}
</style>
</head>

<body>


<div id="container">
    <canvas id="canvas" width="360" height="640"></canvas>

    <div id="controls">
        <button onclick="nextStep()">▶</button>
        <button onclick="prevStep()">◀</button>
    </div>
</div>


<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();
let imageLoaded = false;
let points = [];
let traits = [];
let pathEdges = [];

let step = 0;

/* =========================
   LOAD
========================= */
function load() {
    img.onload = () => {
        imageLoaded = true;
        redraw();
    };

    img.src = "parc monceau.png";

    fetch("https://jhepneige.github.io/ParcMonceau/plan v1_path v1.json")
    .then(r => r.json())
    .then(data => {
        points = data.points || [];
        traits = data.traits || [];
        pathEdges = data.path || [];
        redraw();
    });
}

load();

/* =========================
   NAVIGATION
========================= */
function nextStep() {
    if (step < pathEdges.length - 1) step++;
    redraw();
}

function prevStep() {
    if (step > 0) step--;
    redraw();
}

/* =========================
   DRAW
========================= */
function redraw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (!imageLoaded || pathEdges.length === 0) return;

    const currEdge = pathEdges[step];
   // const prevEdge = pathEdges[step - 1] || currEdge;

    const currNode = points[currEdge.from];
    const nextNode = points[currEdge.to];
    const prevNode = step==0?  {x: 546, y: 157-10}  : points[pathEdges[step - 1].from];

    // direction d'où on vient
    const angleFrom = Math.atan2(
        currNode.y - prevNode.y,
        currNode.x - prevNode.x
    );

    // direction vers où on va
    const angleTo = Math.atan2(
        nextNode.y - currNode.y,
        nextNode.x - currNode.x
    );

    ctx.save();

    // centre écran
    ctx.translate(canvas.width / 2, canvas.height/2);

    // orienter pour que "d'où on vient" soit vers le bas
    ctx.rotate(-angleFrom - Math.PI/2);

    // zoom fort
    const zoom = 4;
    ctx.scale(zoom, zoom);

    // centrer sur noeud courant
    ctx.translate(-currNode.x, -currNode.y);

    // fond
    ctx.drawImage(img,0,0);

    ctx.restore();

    drawArrow(- angleFrom + angleTo);
}

/* =========================
   FLECHE
========================= */
function drawArrow(relativeAngle) {
    ctx.save();

    ctx.translate(canvas.width/2, canvas.height/2);

    ctx.rotate(relativeAngle);

    ctx.fillStyle = "blue";

    ctx.beginPath();
    ctx.moveTo(0,-100);
    ctx.lineTo(20,-60);
    ctx.lineTo(5,-60);
    ctx.lineTo(5, 0);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-5,-60);
    ctx.lineTo(-20,-60);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

</script>

</body>
</html>
